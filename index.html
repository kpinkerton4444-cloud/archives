<!DOCTYPE html>
<html>
<head>
    <title>Patrons of the Restricted Section</title>
    <style>
        body {
            background: #0a0d08; /* Obsidian Ink */
            color: #d4c3a3; /* Vellum */
            font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .vault-container {
            text-align: center;
            border: 1px solid #4b1f1f; /* Wicked Raspberry */
            padding: 60px;
            background: rgba(13, 17, 10, 0.8);
            box-shadow: 0 0 30px #000;
        }
        h1 {
            letter-spacing: 10px;
            text-transform: uppercase;
            font-weight: normal;
            margin-bottom: 5px;
        }
        p {
            font-style: italic;
            opacity: 0.6;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            border: 1px solid #4b1f1f;
            color: #d4c3a3;
            text-decoration: none;
            letter-spacing: 3px;
            transition: 0.5s;
        }
        .btn:hover {
            background: #4b1f1f;
            color: #0a0d08;
            box-shadow: 0 0 20px #4b1f1f;
        }
    </style>
</head>
<body>
    <div class="vault-container">
        <h1>Restricted Section</h1>
        <p>A destination for the uncatalogued soul.</p>
        <a href="mailto:archivist@hekatescript.com?subject=Petition%20for%20Entry" class="btn">Petition for Entry</a>
    </div>
</body>
</html>
